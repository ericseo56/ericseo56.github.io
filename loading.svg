<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Ring mask: outer circle minus inner hole -->
    <mask id="ring">
      <circle cx="50" cy="50" r="47" fill="white"/>
      <circle cx="50" cy="50" r="27" fill="black"/>
    </mask>

    <!-- Base teal, offset light source toward top-left -->
    <radialGradient id="base" cx="40" cy="33" r="55" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#40ccc4"/>
      <stop offset="40%"  stop-color="#1da8a3"/>
      <stop offset="100%" stop-color="#0a6464"/>
    </radialGradient>

    <!-- Top-left white gloss -->
    <radialGradient id="gloss-top" cx="33" cy="23" r="26" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="white" stop-opacity="0.82"/>
      <stop offset="55%"  stop-color="white" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>

    <!-- Bottom-center aqua highlight -->
    <radialGradient id="gloss-bottom" cx="50" cy="83" r="17" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#b8fff8" stop-opacity="0.95"/>
      <stop offset="65%"  stop-color="#b8fff8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#b8fff8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <g mask="url(#ring)">
    <rect width="100" height="100" fill="url(#base)"/>
    <rect width="100" height="100" fill="url(#gloss-top)"/>
    <rect width="100" height="100" fill="url(#gloss-bottom)"/>
  </g>

  <!-- Inner and outer edge definition -->
  <circle cx="50" cy="50" r="27.5" fill="none"
    stroke="#095555" stroke-width="1.5" stroke-opacity="0.4" mask="url(#ring)"/>
  <circle cx="50" cy="50" r="46.5" fill="none"
    stroke="#095555" stroke-width="1.5" stroke-opacity="0.4" mask="url(#ring)"/>

  <!-- Active/moving segment: 36° arc from 12 o'clock, darkened overlay -->
  <circle cx="50" cy="50" r="37"
    fill="none" stroke="#053535" stroke-width="20.5"
    stroke-dasharray="38.75 193.73"
    stroke-opacity="0.35"
    transform="rotate(-90 50 50)"
    mask="url(#ring)"/>

  <!-- Separator line 1: at 12 o'clock (start of active segment) -->
  <line x1="50" y1="3" x2="50" y2="23"
    stroke="#032828" stroke-width="1.2" stroke-opacity="0.7"/>

  <!-- Separator line 2: at 36° clockwise (end of active segment) -->
  <line x1="90.70" y1="26.50" x2="73.38" y2="36.50"
    stroke="#032828" stroke-width="1.2" stroke-opacity="0.7"/>
</svg>
